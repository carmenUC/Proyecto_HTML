    <h1>Log-in</h1>
    <form action="" method="get" name="login">
      <p>
        <fieldset>
          <legend>Inicio de sesión</legend>
        <p>
          <label for="usuario">Nombre de usuario</label>
          <input type="email" name="usuario" id="usuario" placeholder="e-mail">
        </p>
        <p>
          <label for="psswrd">Contraseña</label>
          <input type="password" name="psswrd" id="psswrd" max="12">
        </p>
        <p>
          <label for="rwpsswrd">Re-introduce tu contraseña:</label>
          <input type="password" name="rwpsswrd" id="rwpsswrd" max="12">
        </p>
        <button>Iniciar sesión</button>
        </fieldset>
      </p>
    </form>
