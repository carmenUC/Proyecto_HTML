  <main>
    <h1>Registro</h1>
    <p>Acceso alumnado Conquer Blocks</p>
    <form action="" method="post" name="registro" enctype="multipart/form-data">
      <p>
      <fieldset>
        <legend>Datos personales</legend>
      
      <p>
        <label for="name">Nombre: </label>
        <input type="text" name="nombre" id="name" maxlength="50">
      </p>

      <p>
        <label for="lastname">Apellidos: </label>
        <input type="text" name="apellidos" id="lastname" maxlength="50">
      </p>

      <p>
        <label for="nac">Fecha de Nacimiento:</label>
        <input type="date" name="nacimiento" id="nac">
      </p>
      </fieldset>
      </p>
     
        <fieldset>
          <legend>Dirección</legend>
        <p>
        <label for="calle">Calle:</label>
        <input type="text" name="calle" id="calle">
        </p>
        
        <p><label for="n">Número:</label>
        <input type="number" name="n" id="n" size="5" min="1" max="500">
        </p>
        
        <p>
        <label for="cp">Código postal:</label>
        <input type="number" name="cp" id="cp" max="5" size="5">
        </p>
        
        <p>
          <label for="prov">Provincia:</label>
          <select name="prov" id="prov">
            <option value="">-</option>
            <option value="A">Alicante</option>
            <option value="M">Madrid</option>
            <option value="S">Sevilla</option>
            <option value="V">Valencia</option>
            <option value="L">Lugo</option>
            <option value="Ou">Ourense</option>
            <option value="M">Malaga</option>
          </select>
        </p>
        </fieldset>
    
      <fieldset>
        <legend>Contacto</legend>
        <p>
          <label for="tlf">Teléfono:</label>
          <input type="text" name="tlf" id="tlf" max="9" size="9">
        </p>
        <p>
          <label for="email">Email:</label>
          <input type="email" name="email" id="email">
        </p>
      </fieldset>

      <fieldset>
        <legend>Sobre ti</legend>
      
        <p>
          <label for="www">Url:</label>
          <input type="url" name="www" id="www">
        </p>

        <p>
          <label for="foto">Foto:</label>
          <input type="file" name="foto" id="foto">
        </p>

        <p>
          <label for="bio">Bio</label><br>
          <textarea name="bio" id="bio" cols="40" rows="7" placeholder="Háblanos un poco sobre ti"></textarea> <br>
        </p>
      </fieldset>
      
      <p>
        <input type="checkbox" name="news" id="news" checked>
        <label for="news">Deseo recibir información sobre novedades y ofertas</label>
      </p>
      <p>
        <input type="checkbox" name="privacy" id="privacy" required>
        <label for="privacy">He leído y acepto la política de privacidad</label>
      </p>

      <p>
        <button>Enviar</button>
        <input type="reset" value="Borrar formulario">
      </p>
    </form>

  </main>
